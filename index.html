<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldView — Spatial Intelligence</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- CesiumJS -->
<script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<!-- satellite.js for TLE orbital propagation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.4/satellite.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --glass: rgba(10, 12, 20, 0.78);
  --border: rgba(255,255,255,0.08);
  --accent: #2dd4bf;
  --text: #e2e8f0;
  --muted: rgba(226,232,240,0.45);
  --aircraft: #38bdf8;
  --satellite: #fbbf24;
  --cctv: #c084fc;
  --danger: #f87171;
  --radius: 10px;
}

body {
  background: #000;
  font-family: 'Inter', system-ui, sans-serif;
  overflow: hidden;
  color: var(--text);
}

#cesiumContainer { width: 100vw; height: 100vh; }
.cesium-widget-credits, .cesium-viewer-bottom { display: none !important; }

/* ── TOP BAR ── */
#topbar {
  position: absolute;
  top: 16px; left: 16px; right: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: none;
  z-index: 100;
}

.logo {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
}

.coord-pill {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
  font-size: 11px;
  font-family: 'Courier New', monospace;
  color: var(--muted);
  display: flex;
  gap: 14px;
}

.coord-pill span { color: var(--text); }

#modeDisplay {
  margin-left: auto;
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 1px;
}

/* ── SIDEBAR ── */
#sidebar {
  position: absolute;
  top: 70px; right: 16px;
  width: 240px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

#sidebar.hidden {
  transform: translateX(260px);
  opacity: 0;
  pointer-events: none;
}

.card {
  background: var(--glass);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}

.card-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.stat-row:last-child { margin-bottom: 0; }

.stat-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: var(--muted);
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot-live { background: #22c55e; box-shadow: 0 0 5px #22c55e; animation: blink 2s ease-in-out infinite; }
.dot-ac   { background: var(--aircraft); }
.dot-sat  { background: var(--satellite); }
.dot-cctv { background: var(--cctv); }

@keyframes blink {
  0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
}

.stat-value {
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}

/* Intel card */
#targetCard {
  transition: opacity 0.2s;
}

#targetInfo {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.8;
}

#targetInfo .t-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  display: block;
}

/* Clock */
#clock {
  font-size: 11px;
  font-family: 'Courier New', monospace;
  color: var(--muted);
  line-height: 1.7;
}

/* ── SIDEBAR TOGGLE ── */
#sidebarToggle {
  position: absolute;
  top: 70px; right: 16px;
  z-index: 101;
  width: 36px; height: 36px;
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  pointer-events: all;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 16px;
  transition: color 0.2s;
}

#sidebarToggle:hover { color: var(--text); }
#sidebar:not(.hidden) ~ #sidebarToggle,
#sidebarToggle.open { right: 268px; }

/* ── MODE SWITCHER ── */
#controls {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  z-index: 100;
  pointer-events: all;
  background: var(--glass);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px;
}

.mode-btn {
  background: transparent;
  border: none;
  border-radius: 10px;
  color: var(--muted);
  padding: 8px 16px;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.mode-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

.mode-btn.active {
  background: rgba(45, 212, 191, 0.15);
  color: var(--accent);
}

.mode-btn.god-on {
  background: rgba(248,113,113,0.15);
  color: var(--danger);
  animation: godPulse 2s ease-in-out infinite;
}

@keyframes godPulse {
  0%, 100% { background: rgba(248,113,113,0.12); }
  50%       { background: rgba(248,113,113,0.25); }
}

/* ── OVERLAYS ── */
#overlay-scanlines {
  position: absolute; inset: 0; pointer-events: none; display: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
}
#overlay-vignette-nvg {
  position: absolute; inset: 0; pointer-events: none; display: none;
  background: radial-gradient(ellipse at center, transparent 52%, rgba(0,15,0,0.9) 100%);
}
#overlay-anime {
  position: absolute; inset: 0; pointer-events: none; display: none;
  border: 8px solid rgba(255,150,200,0.2);
  box-shadow: inset 0 0 60px rgba(255,100,180,0.07);
}

/* ── RETICLE ── */
#reticle {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: none; pointer-events: none;
}

/* ── NOTIFICATION ── */
.notif {
  position: absolute;
  top: 70px; left: 50%;
  transform: translateX(-50%);
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 500;
  animation: notifAnim 3s forwards;
  white-space: nowrap;
  z-index: 200;
}
.notif.red { border-color: rgba(248,113,113,0.4); color: var(--danger); }

@keyframes notifAnim {
  0%   { opacity: 0; transform: translateX(-50%) translateY(-6px); }
  15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── LOADING ── */
#loading {
  position: absolute; inset: 0;
  background: #050810;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999;
  gap: 20px;
}

.load-logo {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: 8px;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(45,212,191,0.5);
}

.load-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.load-bar-wrap {
  width: 220px; height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
}

.load-bar {
  height: 100%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  width: 0%; transition: width 0.4s ease;
}

.load-status {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  min-height: 18px;
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="load-logo">WORLDVIEW</div>
  <div class="load-sub">Spatial Intelligence Platform</div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <div class="load-status" id="loadStatus">Initializing...</div>
</div>

<div id="cesiumContainer"></div>

<!-- HUD -->
<div id="hud" style="position:absolute;inset:0;pointer-events:none;z-index:100;">

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">WorldView</div>
    <div class="coord-pill">
      <span id="coordDisplay">—</span>
      <span id="altDisplay">—</span>
    </div>
    <div id="modeDisplay">Standard</div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">

    <!-- Live stats -->
    <div class="card">
      <div class="card-title">Live Data</div>
      <div class="stat-row">
        <span class="stat-label"><span class="dot dot-live"></span> Feed</span>
        <span class="stat-value" id="lastUpdate" style="font-size:11px;color:var(--muted)">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label"><span class="dot dot-ac"></span> Aircraft</span>
        <span class="stat-value" id="aircraftCount">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label"><span class="dot dot-sat"></span> Satellites</span>
        <span class="stat-value" id="satelliteCount">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label"><span class="dot dot-cctv"></span> CCTV Nodes</span>
        <span class="stat-value" id="cctvCount">—</span>
      </div>
    </div>

    <!-- Selected target -->
    <div class="card" id="targetCard">
      <div class="card-title">Selected Target</div>
      <div id="targetInfo" style="color:var(--muted);font-size:12px;">Click any object on the globe</div>
    </div>

    <!-- Clock -->
    <div class="card">
      <div id="clock"></div>
    </div>

  </div>

  <!-- Sidebar toggle button -->
  <button id="sidebarToggle" class="open" onclick="toggleSidebar()" style="pointer-events:all;">⊞</button>

  <!-- Mode switcher -->
  <div id="controls">
    <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">🌍 Standard</button>
    <button class="mode-btn"        id="btn-nvg"    onclick="setMode('nvg')">🟢 Night Vision</button>
    <button class="mode-btn"        id="btn-flir"   onclick="setMode('flir')">🔥 Thermal</button>
    <button class="mode-btn"        id="btn-crt"    onclick="setMode('crt')">📺 CRT</button>
    <button class="mode-btn"        id="btn-anime"  onclick="setMode('anime')">✨ Anime</button>
    <button class="mode-btn"        id="btn-god"    onclick="toggleGodMode()">⚡ God Mode</button>
  </div>

  <!-- CSS overlays -->
  <div id="overlay-scanlines"></div>
  <div id="overlay-vignette-nvg"></div>
  <div id="overlay-anime"></div>

  <!-- Reticle -->
  <div id="reticle">
    <svg width="120" height="120" viewBox="0 0 120 120" opacity="0.8">
      <circle cx="60" cy="60" r="50" fill="none" stroke="#f87171" stroke-width="1" stroke-dasharray="4 6"/>
      <circle cx="60" cy="60" r="5"  fill="none" stroke="#f87171" stroke-width="1.5"/>
      <line x1="60" y1="0"   x2="60" y2="48"  stroke="#f87171" stroke-width="1"/>
      <line x1="60" y1="72"  x2="60" y2="120" stroke="#f87171" stroke-width="1"/>
      <line x1="0"   y1="60" x2="48" y2="60"  stroke="#f87171" stroke-width="1"/>
      <line x1="72"  y1="60" x2="120" y2="60" stroke="#f87171" stroke-width="1"/>
    </svg>
  </div>

</div>

<script>
// ================================================================
// CONFIGURATION
// ================================================================
const CFG = {
  // Free token: https://ion.cesium.com/tokens
  CESIUM_TOKEN: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWUxNy1mMDA1LTQzNzYtODc4OS05MDhjNDQwMjQ1MjIiLCJpZCI6NTc3OTUsImlhdCI6MTYyNjYwMzYwNn0.1FNiClcJ8fEHf6BNYF0GnELGBvqXRCtGAGTq_HKPQNQ',

  // Free key: https://developers.google.com/maps/documentation/tile
  GOOGLE_MAPS_KEY: '',   // leave blank to skip Google 3D tiles

  OPENSKY_URL:    'https://opensky-network.org/api/states/all',
  CELESTRAK_URL:  'https://celestrak.org/NORAD/elements/gp.php',

  FLIGHT_UPDATE_MS:    45000,  // 45 s (OpenSky free tier)
  SATELLITE_UPDATE_MS: 1000,   // 1 s (computed locally from TLE)
};

// ================================================================
// SHADERS — GLSL fragment shaders for CesiumJS PostProcessStage
// ================================================================
const GLSL = {
  nvg: `
    uniform sampler2D colorTexture;
    in vec2 v_textureCoordinates;
    void main() {
      vec4 c = texture(colorTexture, v_textureCoordinates);
      float lum = dot(c.rgb, vec3(0.299, 0.587, 0.114));
      // Film grain
      float t = float(czm_frameNumber) * 0.07;
      vec2 uv = v_textureCoordinates;
      float noise = fract(sin(dot(uv * 120.0 + t, vec2(12.9898, 78.233))) * 43758.5453);
      lum = clamp(lum + noise * 0.04, 0.0, 1.0);
      // Green phosphor
      vec3 nvg = vec3(lum * 0.12, lum * 1.05 + 0.06, lum * 0.14);
      // Circular vignette
      vec2 p = uv * 2.0 - 1.0;
      float vig = pow(clamp(1.0 - dot(p * 0.42, p * 0.42), 0.0, 1.0), 1.8);
      out_FragColor = vec4(nvg * vig, 1.0);
    }`,

  flir: `
    uniform sampler2D colorTexture;
    in vec2 v_textureCoordinates;
    vec3 thermal(float t) {
      t = clamp(t, 0.0, 1.0);
      if (t < 0.20) return mix(vec3(0.00,0.00,0.00), vec3(0.04,0.04,0.28), t/0.20);
      if (t < 0.40) return mix(vec3(0.04,0.04,0.28), vec3(0.00,0.50,0.55), (t-0.20)/0.20);
      if (t < 0.60) return mix(vec3(0.00,0.50,0.55), vec3(0.00,0.80,0.10), (t-0.40)/0.20);
      if (t < 0.80) return mix(vec3(0.00,0.80,0.10), vec3(1.00,0.50,0.00), (t-0.60)/0.20);
      return mix(vec3(1.00,0.50,0.00), vec3(1.00,1.00,1.00), (t-0.80)/0.20);
    }
    void main() {
      vec4 c = texture(colorTexture, v_textureCoordinates);
      float heat = dot(c.rgb, vec3(0.299, 0.587, 0.114));
      heat = pow(heat, 0.65);
      // Scanline artifact
      heat += sin(v_textureCoordinates.y * 900.0) * 0.015;
      out_FragColor = vec4(thermal(heat), 1.0);
    }`,

  crt: `
    uniform sampler2D colorTexture;
    in vec2 v_textureCoordinates;
    vec2 barrel(vec2 uv) {
      uv = uv * 2.0 - 1.0;
      float r2 = dot(uv, uv);
      uv *= 1.0 + r2 * 0.09;
      return uv * 0.5 + 0.5;
    }
    void main() {
      vec2 uv = barrel(v_textureCoordinates);
      if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
        out_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
        return;
      }
      float sh = 0.003;
      float r = texture(colorTexture, vec2(uv.x + sh, uv.y)).r;
      float g = texture(colorTexture, uv).g;
      float b = texture(colorTexture, vec2(uv.x - sh, uv.y)).b;
      vec3 col = vec3(r, g, b);
      // Scanlines
      float sl = mod(floor(uv.y * 700.0), 2.0);
      col *= 0.82 + sl * 0.18;
      col.g *= 1.08; col.r *= 0.94;
      // Vignette
      vec2 p = v_textureCoordinates * 2.0 - 1.0;
      col *= clamp(1.0 - dot(p * 0.38, p * 0.38), 0.0, 1.0);
      out_FragColor = vec4(col, 1.0);
    }`,

  anime: `
    uniform sampler2D colorTexture;
    in vec2 v_textureCoordinates;
    void main() {
      vec2 uv = v_textureCoordinates;
      vec2 px = vec2(1.0/1920.0, 1.0/1080.0);
      // Sobel edge detection
      vec3 tl = texture(colorTexture, uv + vec2(-1,-1)*px).rgb;
      vec3 tc = texture(colorTexture, uv + vec2( 0,-1)*px).rgb;
      vec3 tr = texture(colorTexture, uv + vec2( 1,-1)*px).rgb;
      vec3 ml = texture(colorTexture, uv + vec2(-1, 0)*px).rgb;
      vec3 mr = texture(colorTexture, uv + vec2( 1, 0)*px).rgb;
      vec3 bl = texture(colorTexture, uv + vec2(-1, 1)*px).rgb;
      vec3 bc = texture(colorTexture, uv + vec2( 0, 1)*px).rgb;
      vec3 br = texture(colorTexture, uv + vec2( 1, 1)*px).rgb;
      vec3 sobelX = -tl + tr - 2.0*ml + 2.0*mr - bl + br;
      vec3 sobelY = -tl - 2.0*tc - tr + bl + 2.0*bc + br;
      float edge = smoothstep(0.25, 0.75, length(sobelX) + length(sobelY));
      // Posterize
      vec3 col = floor(texture(colorTexture, uv).rgb * 5.0) / 5.0;
      // Saturate
      float lum = dot(col, vec3(0.299, 0.587, 0.114));
      col = mix(vec3(lum), col, 1.7);
      // Outline
      col = mix(col, vec3(0.04, 0.04, 0.10), edge);
      out_FragColor = vec4(col, 1.0);
    }`
};

// ================================================================
// STATE
// ================================================================
let viewer, shaderStages = {};
let currentMode  = 'normal';
let godModeOn    = false;
let aircraftMap  = {};
let satelliteMap = {};
let satelliteTLEs = [];

// ================================================================
// LOADING UI
// ================================================================
function setLoad(pct, text) {
  document.getElementById('loadBar').style.width = pct + '%';
  document.getElementById('loadStatus').textContent = text;
}

// ================================================================
// CESIUM INIT
// ================================================================
function initCesium() {
  // Blank out Ion token so CesiumJS never attempts Ion requests
  Cesium.Ion.defaultAccessToken = '';

  viewer = new Cesium.Viewer('cesiumContainer', {
    terrainProvider:      new Cesium.EllipsoidTerrainProvider(),
    baseLayer:            false,   // skip default Ion imagery layer
    skyBox:               false,   // skip Ion skybox (asset 2)
    skyAtmosphere:        false,   // skip Ion atmosphere
    timeline:             false,
    animation:            false,
    baseLayerPicker:      false,
    geocoder:             false,
    homeButton:           false,
    sceneModePicker:      false,
    navigationHelpButton: false,
    fullscreenButton:     false,
    infoBox:              false,
    selectionIndicator:   false,
  });

  // ESRI World Imagery — free, no API key required
  viewer.imageryLayers.removeAll();
  viewer.imageryLayers.addImageryProvider(
    new Cesium.UrlTemplateImageryProvider({
      url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      maximumLevel: 19,
      credit: 'ESRI World Imagery',
    })
  );

  // Try to upgrade to ArcGIS terrain (free, no key)
  Cesium.ArcGISTiledElevationTerrainProvider.fromUrl(
    'https://elevation3d.arcgis.com/arcgis/rest/services/WorldElevation3D/Terrain3D/ImageServer'
  ).then(tp => viewer.terrainProvider = tp).catch(() => {});

  viewer.scene.globe.enableLighting = true;
  viewer.scene.fog.enabled = true;
  viewer.scene.highDynamicRange = false;

  // Start view over Austin, TX
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-97.7431, 30.2672, 550000),
    orientation: {
      heading: Cesium.Math.toRadians(0),
      pitch:   Cesium.Math.toRadians(-50),
      roll:    0
    },
    duration: 3
  });
}

// ================================================================
// POST-PROCESS SHADERS
// ================================================================
function initShaders() {
  for (const [name, glsl] of Object.entries(GLSL)) {
    const stage = viewer.scene.postProcessStages.add(
      new Cesium.PostProcessStage({ fragmentShader: glsl })
    );
    stage.enabled = false;
    shaderStages[name] = stage;
  }
}

// ================================================================
// AIRCRAFT — OpenSky Network
// ================================================================
async function fetchAircraft() {
  try {
    const r = await fetch(CFG.OPENSKY_URL, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const states = (data.states || []).filter(s => s[5] && s[6] && !s[8]);
    updateAircraftEntities(states);
    document.getElementById('aircraftCount').textContent = states.length.toString();
    document.getElementById('lastUpdate').textContent = 'LIVE';
  } catch (e) {
    console.warn('[OpenSky]', e.message);
    document.getElementById('aircraftCount').textContent = 'API UNAVAIL';
    document.getElementById('lastUpdate').textContent = 'DEMO';
    loadDemoAircraft();
  }
}

function updateAircraftEntities(states) {
  const live = new Set();

  states.forEach(s => {
    const [icao24, callsign, country, , , lon, lat, baroAlt, , velocity, track] = s;
    if (!lon || !lat) return;

    const id  = icao24;
    const cs  = (callsign || icao24).trim();
    const alt = baroAlt || 8000;
    const hdg = track || 0;
    const spd = velocity || 0;
    live.add(id);

    const pos = Cesium.Cartesian3.fromDegrees(lon, lat, alt);

    if (aircraftMap[id]) {
      aircraftMap[id].position = pos;
    } else {
      aircraftMap[id] = viewer.entities.add({
        id:   'ac_' + id,
        name: cs,
        position: pos,
        point: {
          pixelSize: 5,
          color: Cesium.Color.CYAN,
          outlineColor: Cesium.Color.fromCssColorString('#004433'),
          outlineWidth: 1,
          scaleByDistance: new Cesium.NearFarScalar(1e4, 2.0, 1e7, 0.6),
          disableDepthTestDistance: Number.POSITIVE_INFINITY,
        },
        label: {
          text: cs.substring(0, 10),
          font: '9px Courier New',
          fillColor: Cesium.Color.CYAN,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 2,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          pixelOffset: new Cesium.Cartesian2(10, -6),
          scaleByDistance: new Cesium.NearFarScalar(1e4, 1.0, 2e6, 0.0),
          disableDepthTestDistance: Number.POSITIVE_INFINITY,
        },
        properties: {
          entityType: 'aircraft',
          callsign: cs,
          altitude: Math.round(alt),
          speed: Math.round(spd),
          heading: Math.round(hdg),
          country: country,
          icao: icao24,
        }
      });
    }
  });

  // Remove stale
  Object.keys(aircraftMap).forEach(id => {
    if (!live.has(id)) {
      viewer.entities.remove(aircraftMap[id]);
      delete aircraftMap[id];
    }
  });
}

// ================================================================
// SATELLITES — CelesTrak TLE + satellite.js propagation
// ================================================================
async function fetchSatellites() {
  // Try JSON first (includes TLE lines)
  try {
    const r = await fetch(`${CFG.CELESTRAK_URL}?GROUP=visual&FORMAT=tle`, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
    satelliteTLEs = [];
    for (let i = 0; i + 2 < lines.length; i += 3) {
      const name = lines[i];
      const l1   = lines[i + 1];
      const l2   = lines[i + 2];
      if (l1[0] !== '1' || l2[0] !== '2') continue;
      try {
        const satrec = satellite.twoline2satrec(l1, l2);
        satelliteTLEs.push({ name, satrec });
      } catch (_) {}
    }
    document.getElementById('satelliteCount').textContent = satelliteTLEs.length.toString();
    notify('LOADED ' + satelliteTLEs.length + ' SATELLITE TLEs');
  } catch (e) {
    console.warn('[CelesTrak]', e.message);
    loadDemoSatellites();
  }
}

function propagateSatellites() {
  if (!satelliteTLEs.length) return;
  const now  = new Date();
  const gmst = satellite.gstime(now);

  satelliteTLEs.forEach((sat, i) => {
    try {
      const pv = satellite.propagate(sat.satrec, now);
      if (!pv || !pv.position) return;

      const geo = satellite.eciToGeodetic(pv.position, gmst);
      const lon = satellite.degreesLong(geo.longitude);
      const lat = satellite.degreesLat(geo.latitude);
      const alt = geo.height * 1000; // km → m

      if (isNaN(lon) || isNaN(lat) || isNaN(alt) || alt < 0) return;

      const isMil = /USA |KH-|LACROSSE|NROL|KEYHOLE|ONYX/.test(sat.name.toUpperCase());
      const color = isMil ? Cesium.Color.RED : Cesium.Color.YELLOW;
      const id = 'sat_' + i;

      if (satelliteMap[id]) {
        satelliteMap[id].position = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
      } else {
        satelliteMap[id] = viewer.entities.add({
          id,
          name: sat.name,
          position: Cesium.Cartesian3.fromDegrees(lon, lat, alt),
          point: {
            pixelSize: 3,
            color,
            outlineColor: Cesium.Color.WHITE.withAlpha(0.3),
            outlineWidth: 0.5,
            scaleByDistance: new Cesium.NearFarScalar(1e5, 2.5, 1e8, 0.4),
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
          },
          label: {
            text: sat.name.substring(0, 14),
            font: '8px Courier New',
            fillColor: color,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 1,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            pixelOffset: new Cesium.Cartesian2(8, -5),
            scaleByDistance: new Cesium.NearFarScalar(5e4, 1.0, 5e6, 0.0),
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
          },
          properties: {
            entityType: 'satellite',
            satName: sat.name,
            altitude: Math.round(alt / 1000),
            isMilitary: isMil,
          }
        });
      }
    } catch (_) {}
  });
}

// ================================================================
// VEHICLE PARTICLE SYSTEM — simulated road flows
// ================================================================
function initVehicleParticles() {
  // Austin road corridors with waypoints [lon, lat]
  const corridors = [
    { name:'I-35',  pts:[[-97.733,30.185],[-97.740,30.250],[-97.741,30.330],[-97.742,30.410]] },
    { name:'Loop1', pts:[[-97.783,30.198],[-97.781,30.265],[-97.774,30.337],[-97.762,30.393]] },
    { name:'183',   pts:[[-97.838,30.338],[-97.781,30.346],[-97.719,30.352],[-97.662,30.358]] },
    { name:'Hwy71', pts:[[-97.818,30.220],[-97.771,30.226],[-97.720,30.228],[-97.670,30.229]] },
  ];

  corridors.forEach(road => {
    const n = 10;
    for (let i = 0; i < n; i++) {
      const t  = i / n;
      const pi = Math.min(Math.floor(t * (road.pts.length - 1)), road.pts.length - 2);
      const t2 = (t * (road.pts.length - 1)) - pi;
      const p0 = road.pts[pi];
      const p1 = road.pts[pi + 1];
      const lon = p0[0] + (p1[0] - p0[0]) * t2;
      const lat = p0[1] + (p1[1] - p0[1]) * t2;

      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(lon, lat, 5),
        point: {
          pixelSize: 2,
          color: Cesium.Color.fromCssColorString('#ff8800').withAlpha(0.75),
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
          scaleByDistance: new Cesium.NearFarScalar(500, 2.5, 5e4, 0.0),
          disableDepthTestDistance: 5000,
        },
        properties: { entityType: 'vehicle', road: road.name }
      });
    }
  });
}

// ================================================================
// VISUAL MODES
// ================================================================
function setMode(mode) {
  currentMode = mode;

  // Disable all shader stages
  Object.values(shaderStages).forEach(s => s.enabled = false);

  // Hide CSS overlays
  document.getElementById('overlay-scanlines').style.display    = 'none';
  document.getElementById('overlay-vignette-nvg').style.display = 'none';
  document.getElementById('overlay-anime').style.display        = 'none';

  // Update button states
  document.querySelectorAll('.mode-btn:not(#btn-god)').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode)?.classList.add('active');

  switch (mode) {
    case 'nvg':
      shaderStages.nvg.enabled = true;
      document.getElementById('overlay-vignette-nvg').style.display = 'block';
      document.getElementById('modeDisplay').textContent = '🟢 Night Vision';
      break;
    case 'flir':
      shaderStages.flir.enabled = true;
      document.getElementById('modeDisplay').textContent = '🔥 Thermal';
      break;
    case 'crt':
      shaderStages.crt.enabled = true;
      document.getElementById('overlay-scanlines').style.display = 'block';
      document.getElementById('modeDisplay').textContent = '📺 CRT';
      break;
    case 'anime':
      shaderStages.anime.enabled = true;
      document.getElementById('overlay-anime').style.display = 'block';
      document.getElementById('modeDisplay').textContent = '✨ Anime';
      break;
    default:
      document.getElementById('modeDisplay').textContent = '🌍 Standard';
  }
}

// ================================================================
// GOD MODE
// ================================================================
function toggleGodMode() {
  godModeOn = !godModeOn;
  const btn     = document.getElementById('btn-god');
  const reticle = document.getElementById('reticle');

  if (godModeOn) {
    btn.classList.add('god-on');
    btn.textContent = '⚡ GOD ON';
    reticle.style.display = 'block';

    Object.values(aircraftMap).forEach(e => {
      e.point.color   = Cesium.Color.RED;
      e.point.pixelSize = 9;
    });
    Object.values(satelliteMap).forEach(e => {
      e.point.color   = Cesium.Color.ORANGE;
      e.point.pixelSize = 6;
    });

    const ac  = Object.keys(aircraftMap).length;
    const sat = Object.keys(satelliteMap).length;
    notify(`PANOPTIC VIEW — TRACKING ${ac} AIRCRAFT + ${sat} SATELLITES`, true);
  } else {
    btn.classList.remove('god-on');
    btn.textContent = '⚡ God Mode';
    reticle.style.display = 'none';

    Object.values(aircraftMap).forEach(e => {
      e.point.color   = Cesium.Color.CYAN;
      e.point.pixelSize = 5;
    });
    Object.values(satelliteMap).forEach(e => {
      const mil = e.properties.isMilitary?.getValue();
      e.point.color   = mil ? Cesium.Color.RED : Cesium.Color.YELLOW;
      e.point.pixelSize = 3;
    });
  }
}

// ================================================================
// ENTITY CLICK — target intel panel
// ================================================================
function initClickHandler() {
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(ev => {
    const picked = viewer.scene.pick(ev.position);
    if (!Cesium.defined(picked) || !Cesium.defined(picked.id)) return;

    const entity = picked.id;
    const props  = entity.properties;
    if (!props) return;
    const type = props.entityType?.getValue();

    let html = '';
    if (type === 'aircraft') {
      const cs  = props.callsign?.getValue() || '---';
      const alt = props.altitude?.getValue() || 0;
      const spd = props.speed?.getValue()    || 0;
      const hdg = props.heading?.getValue()  || 0;
      const ctry= props.country?.getValue()  || 'Unknown';
      const icao= props.icao?.getValue()     || '---';
      html = `<span class="t-name">✈ ${cs}</span>
        <span style="color:var(--aircraft);font-size:10px;font-weight:600">AIRCRAFT</span><br><br>
        ICAO &nbsp;&nbsp; ${icao}<br>
        Alt &nbsp;&nbsp;&nbsp;&nbsp; ${Math.round(alt).toLocaleString()} m<br>
        Speed &nbsp;&nbsp; ${Math.round(spd)} m/s<br>
        Heading &nbsp; ${Math.round(hdg)}°<br>
        Origin &nbsp;&nbsp; ${ctry}`;
    } else if (type === 'satellite') {
      const name = props.satName?.getValue()  || entity.name;
      const alt  = props.altitude?.getValue() || 0;
      const mil  = props.isMilitary?.getValue();
      html = `<span class="t-name">🛰 ${name}</span>
        <span style="color:${mil ? 'var(--danger)' : 'var(--satellite)'};font-size:10px;font-weight:600">${mil ? 'MILITARY SAT' : 'SATELLITE'}</span><br><br>
        Altitude &nbsp; ${Math.round(alt).toLocaleString()} km<br>
        Class &nbsp;&nbsp;&nbsp;&nbsp; ${mil ? 'Classified' : 'Civilian'}`;
    } else if (type === 'cctv') {
      const name = props.camName?.getValue() || entity.name;
      html = `<span class="t-name">📷 ${name}</span>
        <span style="color:var(--cctv);font-size:10px;font-weight:600">CCTV NODE</span><br><br>
        Status &nbsp;&nbsp;&nbsp; <span style="color:#22c55e">Live</span><br>
        Feed &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Public Traffic<br>
        Location &nbsp; Austin, TX`;
    } else if (type === 'vehicle') {
      html = `<span class="t-name">🚗 Vehicle</span>
        Road &nbsp;&nbsp; ${props.road?.getValue() || 'Unknown'}<br>
        Status &nbsp; In Transit`;
    }

    if (html) {
      document.getElementById('targetInfo').innerHTML = html;
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
}

// ================================================================
// COORDINATE / CLOCK HUD
// ================================================================
function startHUDUpdates() {
  // Camera coords
  viewer.scene.postRender.addEventListener(() => {
    const carto = viewer.scene.camera.positionCartographic;
    if (!carto) return;
    const lon = Cesium.Math.toDegrees(carto.longitude).toFixed(4);
    const lat = Cesium.Math.toDegrees(carto.latitude).toFixed(4);
    const alt = carto.height;
    const altStr = alt >= 1000 ? (alt / 1000).toFixed(1) + ' km' : Math.round(alt) + ' m';
    document.getElementById('coordDisplay').textContent = `${lat}, ${lon}`;
    document.getElementById('altDisplay').textContent   = altStr;
  });

  // Clock
  setInterval(() => {
    const now = new Date();
    const utc = now.toUTCString().split(' ')[4];
    const loc = now.toLocaleTimeString();
    const date = now.toISOString().split('T')[0];
    document.getElementById('clock').innerHTML =
      `<span style="color:var(--muted);font-size:10px">UTC</span>&nbsp; ${utc}<br><span style="color:var(--muted);font-size:10px">LOCAL</span>&nbsp; ${loc}<br><span style="color:var(--muted);font-size:10px">DATE</span>&nbsp; ${date}`;
  }, 1000);
}

// ================================================================
// KEYBOARD SHORTCUTS
// ================================================================
document.addEventListener('keydown', e => {
  switch (e.key) {
    case '1': setMode('normal'); break;
    case '2': setMode('nvg');   break;
    case '3': setMode('flir');  break;
    case '4': setMode('crt');   break;
    case '5': setMode('anime'); break;
    case 'g':
    case 'G': toggleGodMode();  break;
  }
});

// ================================================================
// NOTIFICATIONS
// ================================================================
function notify(text, isRed = false) {
  const el = document.createElement('div');
  el.className = 'notif' + (isRed ? ' red' : '');
  el.textContent = text;
  document.getElementById('hud').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ================================================================
// GOOGLE 3D TILES (optional — needs API key)
// ================================================================
async function tryLoad3DTiles() {
  if (!CFG.GOOGLE_MAPS_KEY) return;
  try {
    const tileset = await Cesium.Cesium3DTileset.fromUrl(
      `https://tile.googleapis.com/v1/3dtiles/root.json?key=${CFG.GOOGLE_MAPS_KEY}`
    );
    viewer.scene.primitives.add(tileset);
    notify('GOOGLE 3D PHOTOREALISTIC TILES — ONLINE');
  } catch (e) {
    console.warn('[Google 3D Tiles]', e.message);
  }
}

// ================================================================
// MAIN — boot sequence
// ================================================================
function hideLoader() {
  const el = document.getElementById('loading');
  el.style.transition = 'opacity 0.6s';
  el.style.opacity = '0';
  setTimeout(() => el.style.display = 'none', 700);
}

(async () => {
  // --- Phase 1: get the globe on screen ASAP ---
  setLoad(10, 'BOOTING CESIUMJS...');
  try { initCesium(); } catch(e) { console.error('[Cesium init]', e); }

  setLoad(40, 'COMPILING SHADERS...');
  await new Promise(r => setTimeout(r, 500));
  try { initShaders(); } catch(e) { console.error('[Shaders]', e); }

  setLoad(70, 'WIRING HUD...');
  try { addCCTVMarkers(); }    catch(e) {}
  try { initVehicleParticles(); } catch(e) {}
  try { initClickHandler(); }  catch(e) {}
  try { startHUDUpdates(); }   catch(e) {}

  setLoad(100, 'ALL SYSTEMS NOMINAL');
  await new Promise(r => setTimeout(r, 400));
  hideLoader();
  notify('WORLDVIEW ONLINE');

  // --- Phase 2: load live data in background (non-blocking) ---
  fetchSatellites().then(() => {
    propagateSatellites();
    setInterval(propagateSatellites, CFG.SATELLITE_UPDATE_MS);
  }).catch(console.warn);

  fetchAircraft().catch(console.warn);
  setInterval(fetchAircraft, CFG.FLIGHT_UPDATE_MS);

  tryLoad3DTiles().catch(console.warn);
})();
